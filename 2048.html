<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            text-align: center;
            max-width: 460px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #f7b731, #fc5c65);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 25px;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f7b731;
        }

        .grid-container {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 15px;
            padding: 12px;
            margin: 0 auto;
            width: 420px;
            height: 420px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .cell-bg {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .tiles-layer {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: 800;
            transition: top 0.12s ease, left 0.12s ease;
            z-index: 1;
        }

        .tile.new {
            animation: appear 0.2s ease;
        }

        .tile.merged {
            animation: pop 0.2s ease;
            z-index: 2;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.85);
            z-index: 10;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .overlay.hidden { display: none; }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .overlay .win { color: #f7b731; }
        .overlay .lose { color: #fc5c65; }

        .btn {
            padding: 12px 35px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #f7b731, #fc5c65);
            color: #fff;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247, 183, 49, 0.4);
        }

        .controls-hint {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .grid-container {
                width: min(92vw, 380px);
                height: min(92vw, 380px);
            }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>2048</h1>
        <p class="subtitle">Соединяй числа, собери 2048!</p>
        <div class="score-board">
            <div class="score-box">
                <div class="label">Счёт</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">Рекорд</div>
                <div class="value" id="best">0</div>
            </div>
        </div>
        <div class="grid-container" id="gridContainer">
            <div class="grid-bg">
                <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
                <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
                <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
                <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
            </div>
            <div class="tiles-layer" id="tilesLayer"></div>
            <div class="overlay hidden" id="winOverlay">
                <h2 class="win">Победа!</h2>
                <p>Ты собрал 2048!</p>
                <button class="btn" id="continueBtn">Продолжить</button>
                <button class="btn" id="newGameWinBtn">Новая игра</button>
            </div>
            <div class="overlay hidden" id="loseOverlay">
                <h2 class="lose">Игра окончена</h2>
                <p>Нет доступных ходов</p>
                <button class="btn" id="newGameLoseBtn">Заново</button>
            </div>
        </div>
        <p class="controls-hint">Управление: стрелки / WASD / свайпы</p>
        <button class="btn" style="margin-top: 20px;" id="newGameBtn">Новая игра</button>
    </div>

    <script>
        // Блокируем «резину»/скролл на мобилке внутри игры
        document.addEventListener('touchmove', (e) => {
            if (!e.cancelable) return;
            const t = e.target;
            const inGame = (t && t.closest) ? !!t.closest('#gridContainer, button, .game-container') : false;
            if (inGame) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', (e) => { if (e.cancelable) e.preventDefault(); }, { passive: false });

        const SIZE = 4;
        let grid, score, best, won, moved;
        const tilesLayer = document.getElementById('tilesLayer');
        let tileElements = {};
        let tileIdCounter = 0;

        best = parseInt(localStorage.getItem('2048best') || '0');
        document.getElementById('best').textContent = best;

        function getContainerSize() {
            const c = document.getElementById('gridContainer');
            return c.clientWidth - 24; // minus padding
        }

        function getCellSize() {
            const total = getContainerSize();
            return (total - 30) / 4; // 3 gaps of 10px
        }

        function getCellPos(row, col) {
            const cellSize = getCellSize();
            const gap = 10;
            return {
                left: col * (cellSize + gap),
                top: row * (cellSize + gap)
            };
        }

        const TILE_COLORS = {
            2:    { bg: '#eee4da', color: '#776e65', fontSize: '2rem' },
            4:    { bg: '#ede0c8', color: '#776e65', fontSize: '2rem' },
            8:    { bg: '#f2b179', color: '#fff', fontSize: '2rem' },
            16:   { bg: '#f59563', color: '#fff', fontSize: '1.8rem' },
            32:   { bg: '#f67c5f', color: '#fff', fontSize: '1.8rem' },
            64:   { bg: '#f65e3b', color: '#fff', fontSize: '1.8rem' },
            128:  { bg: '#edcf72', color: '#fff', fontSize: '1.6rem' },
            256:  { bg: '#edcc61', color: '#fff', fontSize: '1.6rem' },
            512:  { bg: '#edc850', color: '#fff', fontSize: '1.5rem' },
            1024: { bg: '#edc53f', color: '#fff', fontSize: '1.3rem' },
            2048: { bg: '#edc22e', color: '#fff', fontSize: '1.3rem' },
        };

        function getTileStyle(value) {
            if (TILE_COLORS[value]) return TILE_COLORS[value];
            return { bg: '#3c3a32', color: '#fff', fontSize: '1.2rem' };
        }

        function createTileElement(row, col, value, isNew) {
            const id = ++tileIdCounter;
            const cellSize = getCellSize();
            const pos = getCellPos(row, col);
            const style = getTileStyle(value);

            const el = document.createElement('div');
            el.className = 'tile' + (isNew ? ' new' : '');
            el.dataset.id = id;
            el.style.width = cellSize + 'px';
            el.style.height = cellSize + 'px';
            el.style.left = pos.left + 'px';
            el.style.top = pos.top + 'px';
            el.style.background = style.bg;
            el.style.color = style.color;
            el.style.fontSize = style.fontSize;
            el.textContent = value;

            tilesLayer.appendChild(el);
            return id;
        }

        function updateTileElement(id, row, col, value, merged) {
            const el = tilesLayer.querySelector(`[data-id="${id}"]`);
            if (!el) return;

            const cellSize = getCellSize();
            const pos = getCellPos(row, col);
            const style = getTileStyle(value);

            el.style.left = pos.left + 'px';
            el.style.top = pos.top + 'px';
            el.style.background = style.bg;
            el.style.color = style.color;
            el.style.fontSize = style.fontSize;
            el.textContent = value;

            if (merged) {
                el.classList.remove('merged');
                void el.offsetWidth;
                el.classList.add('merged');
            }
        }

        function removeTileElement(id) {
            const el = tilesLayer.querySelector(`[data-id="${id}"]`);
            if (el) el.remove();
        }

        function initGame() {
            grid = Array.from({ length: SIZE }, () =>
                Array.from({ length: SIZE }, () => ({ value: 0, tileId: null }))
            );
            score = 0;
            won = false;
            tilesLayer.innerHTML = '';
            document.getElementById('score').textContent = 0;
            document.getElementById('winOverlay').classList.add('hidden');
            document.getElementById('loseOverlay').classList.add('hidden');

            addRandomTile();
            addRandomTile();
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c].value === 0) empty.push({ r, c });
                }
            }
            if (empty.length === 0) return;

            const { r, c } = empty[Math.floor(Math.random() * empty.length)];
            const value = Math.random() < 0.9 ? 2 : 4;
            const id = createTileElement(r, c, value, true);
            grid[r][c] = { value, tileId: id };
        }

        function slide(row) {
            let arr = row.filter(cell => cell.value !== 0);
            let result = [];
            let mergedIds = [];

            for (let i = 0; i < arr.length; i++) {
                if (i + 1 < arr.length && arr[i].value === arr[i + 1].value) {
                    const newValue = arr[i].value * 2;
                    score += newValue;
                    result.push({ value: newValue, tileId: arr[i].tileId, mergedFrom: arr[i + 1].tileId });
                    mergedIds.push(arr[i + 1].tileId);
                    i++;
                } else {
                    result.push({ value: arr[i].value, tileId: arr[i].tileId, mergedFrom: null });
                }
            }

            while (result.length < SIZE) {
                result.push({ value: 0, tileId: null, mergedFrom: null });
            }

            return { result, mergedIds };
        }

        function move(dir) {
            let moved = false;
            let allMergedIds = [];

            if (dir === 'left' || dir === 'right') {
                for (let r = 0; r < SIZE; r++) {
                    let row = grid[r].slice();
                    if (dir === 'right') row.reverse();

                    const { result, mergedIds } = slide(row);
                    if (dir === 'right') result.reverse();
                    allMergedIds.push(...mergedIds);

                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c].value !== result[c].value || grid[r][c].tileId !== result[c].tileId) {
                            moved = true;
                        }
                        grid[r][c] = { value: result[c].value, tileId: result[c].tileId };

                        if (result[c].tileId) {
                            updateTileElement(result[c].tileId, r, c, result[c].value, result[c].mergedFrom !== null);
                        }
                    }
                }
            } else {
                for (let c = 0; c < SIZE; c++) {
                    let col = [];
                    for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                    if (dir === 'down') col.reverse();

                    const { result, mergedIds } = slide(col);
                    if (dir === 'down') result.reverse();
                    allMergedIds.push(...mergedIds);

                    for (let r = 0; r < SIZE; r++) {
                        if (grid[r][c].value !== result[r].value || grid[r][c].tileId !== result[r].tileId) {
                            moved = true;
                        }
                        grid[r][c] = { value: result[r].value, tileId: result[r].tileId };

                        if (result[r].tileId) {
                            updateTileElement(result[r].tileId, r, c, result[r].value, result[r].mergedFrom !== null);
                        }
                    }
                }
            }

            // Удаляем поглощённые тайлы
            allMergedIds.forEach(id => {
                if (id) removeTileElement(id);
            });

            if (moved) {
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('2048best', best);
                    document.getElementById('best').textContent = best;
                }

                setTimeout(() => {
                    addRandomTile();
                    checkWin();
                    if (!canMove()) {
                        document.getElementById('loseOverlay').classList.remove('hidden');
                    }
                }, 130);
            }
        }

        function checkWin() {
            if (won) return;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c].value === 2048) {
                        won = true;
                        document.getElementById('winOverlay').classList.remove('hidden');
                        return;
                    }
                }
            }
        }

        function canMove() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c].value === 0) return true;
                    if (c + 1 < SIZE && grid[r][c].value === grid[r][c + 1].value) return true;
                    if (r + 1 < SIZE && grid[r][c].value === grid[r + 1][c].value) return true;
                }
            }
            return false;
        }

        // Клавиатура
        document.addEventListener('keydown', (e) => {
            let dir = null;
            switch (e.key) {
                case 'ArrowLeft': case 'a': case 'A': case 'ф': case 'Ф': dir = 'left'; break;
                case 'ArrowRight': case 'd': case 'D': case 'в': case 'В': dir = 'right'; break;
                case 'ArrowUp': case 'w': case 'W': case 'ц': case 'Ц': dir = 'up'; break;
                case 'ArrowDown': case 's': case 'S': case 'ы': case 'Ы': dir = 'down'; break;
            }
            if (dir) {
                e.preventDefault();
                move(dir);
            }
        });

        // Свайпы
        let touchStartX, touchStartY;
        const gc = document.getElementById('gridContainer');

        gc.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        gc.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 30) return;

            if (absDx > absDy) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
        }, { passive: false });

        // Кнопки
        document.getElementById('newGameBtn').addEventListener('click', initGame);
        document.getElementById('newGameWinBtn').addEventListener('click', initGame);
        document.getElementById('newGameLoseBtn').addEventListener('click', initGame);
        document.getElementById('continueBtn').addEventListener('click', () => {
            document.getElementById('winOverlay').classList.add('hidden');
        });

        initGame();
    </script>
</body>
</html>
