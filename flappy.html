<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1b1b3a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container { text-align: center; }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #feca57, #ff6348);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .info-bar span {
            background: rgba(255,255,255,0.08);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .val { color: #feca57; font-weight: bold; }

        canvas {
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(254, 202, 87, 0.1);
            cursor: pointer;
            display: block;
            margin: 0 auto;
            width: min(92vw, 420px);
            height: auto;
        }

        .hint {
            margin-top: 12px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>FLAPPY BIRD</h1>
        <div class="info-bar">
            <span>Счёт: <span class="val" id="score">0</span></span>
            <span>Рекорд: <span class="val" id="best">0</span></span>
        </div>
        <canvas id="game" width="400" height="600"></canvas>
        <p class="hint">Пробел / клик / тап — прыжок</p>
    </div>

    <script>
        // Блокируем «резину»/скролл на мобилке внутри игры
        document.addEventListener('touchmove', (e) => {
            if (!e.cancelable) return;
            const t = e.target;
            const inGame = (t && t.closest) ? !!t.closest('canvas, .game-container') : false;
            if (inGame) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', (e) => { if (e.cancelable) e.preventDefault(); }, { passive: false });

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        let best = parseInt(localStorage.getItem('flappyBest') || '0');
        document.getElementById('best').textContent = best;

        // Цвета
        const SKY_TOP = '#2c3e50';
        const SKY_BOT = '#3498db';
        const GROUND_COLOR = '#27ae60';
        const GROUND_H = 60;
        const PIPE_COLOR = '#2ecc71';
        const PIPE_BORDER = '#27ae60';
        const BIRD_BODY = '#feca57';
        const BIRD_WING = '#f39c12';
        const BIRD_EYE = '#2c3e50';

        // Состояние
        let bird, pipes, score, frame, state;
        const GRAVITY = 0.45;
        const JUMP = -7.5;
        const PIPE_W = 55;
        const GAP = 155;
        const PIPE_SPEED = 2.5;
        const PIPE_INTERVAL = 100;

        function init() {
            bird = { x: 80, y: H / 2 - 30, vy: 0, radius: 16, angle: 0 };
            pipes = [];
            score = 0;
            frame = 0;
            state = 'ready'; // ready, playing, dead
            document.getElementById('score').textContent = 0;
            draw();
        }

        function jump() {
            if (state === 'ready') {
                state = 'playing';
                bird.vy = JUMP;
                requestAnimationFrame(loop);
            } else if (state === 'playing') {
                bird.vy = JUMP;
            } else if (state === 'dead') {
                init();
            }
        }

        function loop() {
            if (state !== 'playing') return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            frame++;

            // Птица
            bird.vy += GRAVITY;
            bird.y += bird.vy;
            bird.angle = Math.min(bird.vy * 3, 70) * Math.PI / 180;

            // Генерация труб
            if (frame % PIPE_INTERVAL === 0) {
                const minTop = 60;
                const maxTop = H - GROUND_H - GAP - 60;
                const topH = minTop + Math.random() * (maxTop - minTop);
                pipes.push({
                    x: W,
                    topH: topH,
                    scored: false
                });
            }

            // Движение труб
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;
                if (pipes[i].x + PIPE_W < 0) {
                    pipes.splice(i, 1);
                    continue;
                }

                // Счёт
                if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
                    pipes[i].scored = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }

                // Коллизия
                if (checkCollision(pipes[i])) {
                    die();
                    return;
                }
            }

            // Пол / потолок
            if (bird.y + bird.radius > H - GROUND_H || bird.y - bird.radius < 0) {
                die();
            }
        }

        function checkCollision(pipe) {
            const bx = bird.x, by = bird.y, br = bird.radius - 2;

            // Верхняя труба
            if (bx + br > pipe.x && bx - br < pipe.x + PIPE_W &&
                by - br < pipe.topH) return true;

            // Нижняя труба
            const botY = pipe.topH + GAP;
            if (bx + br > pipe.x && bx - br < pipe.x + PIPE_W &&
                by + br > botY) return true;

            return false;
        }

        function die() {
            state = 'dead';
            if (score > best) {
                best = score;
                localStorage.setItem('flappyBest', best);
                document.getElementById('best').textContent = best;
            }
        }

        function draw() {
            // Небо
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, SKY_TOP);
            grad.addColorStop(1, SKY_BOT);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Облака
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            drawCloud(50, 80, 40);
            drawCloud(200, 120, 30);
            drawCloud(320, 60, 35);
            drawCloud(150, 200, 25);

            // Трубы
            pipes.forEach(pipe => {
                drawPipe(pipe);
            });

            // Земля
            ctx.fillStyle = GROUND_COLOR;
            ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
            ctx.fillStyle = '#219150';
            ctx.fillRect(0, H - GROUND_H, W, 5);

            // Трава
            ctx.fillStyle = '#2ecc71';
            for (let i = 0; i < W; i += 12) {
                ctx.beginPath();
                ctx.moveTo(i, H - GROUND_H);
                ctx.lineTo(i + 6, H - GROUND_H - 8);
                ctx.lineTo(i + 12, H - GROUND_H);
                ctx.fill();
            }

            // Птица
            drawBird();

            // Оверлеи
            if (state === 'ready') {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Нажми, чтобы начать!', W / 2, H / 2);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText('Пробел / клик / тап', W / 2, H / 2 + 35);
            }

            if (state === 'dead') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fc5c65';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
                ctx.fillStyle = '#feca57';
                ctx.font = 'bold 22px sans-serif';
                ctx.fillText(`Счёт: ${score}`, W / 2, H / 2 + 20);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '16px sans-serif';
                ctx.fillText('Нажми для рестарта', W / 2, H / 2 + 55);
            }
        }

        function drawPipe(pipe) {
            // Верхняя
            ctx.fillStyle = PIPE_COLOR;
            ctx.fillRect(pipe.x, 0, PIPE_W, pipe.topH);
            ctx.fillStyle = PIPE_BORDER;
            ctx.fillRect(pipe.x - 3, pipe.topH - 25, PIPE_W + 6, 25);
            // Блик
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(pipe.x + 8, 0, 8, pipe.topH - 25);

            // Нижняя
            const botY = pipe.topH + GAP;
            ctx.fillStyle = PIPE_COLOR;
            ctx.fillRect(pipe.x, botY, PIPE_W, H - GROUND_H - botY);
            ctx.fillStyle = PIPE_BORDER;
            ctx.fillRect(pipe.x - 3, botY, PIPE_W + 6, 25);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(pipe.x + 8, botY + 25, 8, H - GROUND_H - botY - 25);
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.angle);

            // Тело
            ctx.fillStyle = BIRD_BODY;
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.radius, bird.radius * 0.85, 0, 0, Math.PI * 2);
            ctx.fill();

            // Крыло
            ctx.fillStyle = BIRD_WING;
            ctx.beginPath();
            const wingY = Math.sin(frame * 0.3) * 3;
            ctx.ellipse(-3, 3 + wingY, 10, 6, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Глаз
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8, -4, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = BIRD_EYE;
            ctx.beginPath();
            ctx.arc(9, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Клюв
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(14, -1);
            ctx.lineTo(22, 2);
            ctx.lineTo(14, 5);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawCloud(x, y, r) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.arc(x + r * 0.8, y - r * 0.3, r * 0.7, 0, Math.PI * 2);
            ctx.arc(x + r * 1.3, y, r * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }

        // Управление
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        init();
    </script>
</body>
</html>
