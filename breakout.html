<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="mini-app.css">
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="mini-app.js"></script>
    <title>Breakout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f1520;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container { text-align: center; }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d9ff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .score-box {
            background: rgba(255,255,255,0.08);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .score-box .label { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        .score-box .value { font-size: 1.4rem; font-weight: bold; color: #00d9ff; }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            border: 2px solid rgba(0,217,255,0.3);
            background: #1a2332;
            width: min(94vw, 520px);
            height: auto;
        }

        .hint {
            margin-top: 12px;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
        }

        .mobile-strip {
            display: none;
            margin-top: 12px;
            gap: 10px;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        .mobile-strip button {
            width: 74px;
            height: 54px;
            border-radius: 14px;
            border: 1px solid rgba(0,217,255,0.25);
            background: rgba(0,217,255,0.08);
            color: #00d9ff;
            font-weight: 800;
            font-size: 1rem;
        }
        .mobile-strip button:active { background: rgba(0,217,255,0.22); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .overlay.visible { display: flex; }

        .overlay h2 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d9ff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay p { color: rgba(255,255,255,0.8); }

        .overlay button {
            padding: 14px 36px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00d9ff, #ff6b9d);
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .overlay button:hover { filter: brightness(1.15); }

        .back-btn {
            position: fixed;
            top: max(10px, env(safe-area-inset-top, 0px));
            left: max(10px, env(safe-area-inset-left, 0px));
            z-index: 200;
            background: rgba(0,0,0,0.52);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.82);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            line-height: 1;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { background: rgba(255,255,255,0.18); }

        @media (max-width: 520px) {
            canvas { max-width: 100vw; }
            h1 { font-size: 1.8rem; }
            .hint { display: none; }
            .mobile-strip { display: flex; }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Назад</a>
    <div class="game-container">
        <h1>BREAKOUT</h1>
        <p class="subtitle">Разбей все кирпичи ракеткой!</p>
        <div class="score-board">
            <div class="score-box"><span class="label">Счёт</span><br><span class="value" id="score">0</span></div>
            <div class="score-box"><span class="label">Жизни</span><br><span class="value" id="lives">3</span></div>
        </div>
        <canvas id="game" width="480" height="560"></canvas>
        <p class="hint">Стрелки или A/D — двигать ракетку. На телефоне — веди пальцем по полю. Тап — запуск.</p>
        <div class="mobile-strip" aria-hidden="true">
            <button type="button" id="mL">◀</button>
            <button type="button" id="mLaunch">СТАРТ</button>
            <button type="button" id="mR">▶</button>
        </div>
    </div>

    <div class="overlay visible" id="startOverlay">
        <h2>BREAKOUT</h2>
        <p>Разбей все кирпичи. Не упусти мяч!</p>
        <button id="btnStart">СТАРТ</button>
    </div>

    <div class="overlay" id="winOverlay">
        <h2>Победа!</h2>
        <p>Все кирпичи разбиты. Счёт: <span id="winScore">0</span></p>
        <button id="btnWinAgain">ЕЩЁ РАЗ</button>
    </div>

    <div class="overlay" id="loseOverlay">
        <h2>Игра окончена</h2>
        <p>Жизни закончились. Счёт: <span id="loseScore">0</span></p>
        <button id="btnLoseAgain">ЗАНОВО</button>
    </div>

    <script>
(function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CW = canvas.width;
    const CH = canvas.height;

    const PADDLE_W = 90;
    const PADDLE_H = 14;
    const BALL_R = 8;
    const BRICK_ROWS = 6;
    const BRICK_COLS = 10;
    const BRICK_GAP = 4;
    const BRICK_TOP = 60;
    const BRICK_W = (CW - (BRICK_COLS + 1) * BRICK_GAP) / BRICK_COLS;
    const BRICK_H = 22;

    let gameRunning = false;
    let score = 0, lives = 3;
    let paddleX = (CW - PADDLE_W) / 2;
    let ball = { x: CW/2, y: CH - 80, vx: 0, vy: 0, launched: false };
    let bricks = [];

    const BRICK_COLORS = ['#ff6b9d', '#ff9f43', '#feca57', '#00d9ff', '#5f27cd', '#00b894'];

    function initBricks() {
        bricks = [];
        for (let row = 0; row < BRICK_ROWS; row++) {
            for (let col = 0; col < BRICK_COLS; col++) {
                bricks.push({
                    x: BRICK_GAP + col * (BRICK_W + BRICK_GAP),
                    y: BRICK_TOP + row * (BRICK_H + BRICK_GAP),
                    w: BRICK_W,
                    h: BRICK_H,
                    color: BRICK_COLORS[row % BRICK_COLORS.length],
                    alive: true
                });
            }
        }
    }

    function resetBall() {
        ball.x = CW/2;
        ball.y = CH - 80;
        ball.vy = -5;
        ball.vx = (Math.random() - 0.5) * 4;
        ball.launched = false;
    }

    function launchBall() {
        if (ball.launched) return;
        ball.launched = true;
        ball.vy = -5;
        ball.vx = (Math.random() - 0.5) * 4;
    }

    function startGame() {
        gameRunning = true;
        score = 0;
        lives = 3;
        paddleX = (CW - PADDLE_W) / 2;
        initBricks();
        resetBall();
        document.getElementById('score').textContent = score;
        document.getElementById('lives').textContent = lives;
    }

    function draw() {
        ctx.fillStyle = '#1a2332';
        ctx.fillRect(0, 0, CW, CH);

        // Bricks
        bricks.forEach(b => {
            if (!b.alive) return;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        });

        // Paddle
        ctx.fillStyle = '#00d9ff';
        ctx.fillRect(paddleX, CH - PADDLE_H - 20, PADDLE_W, PADDLE_H);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.strokeRect(paddleX, CH - PADDLE_H - 20, PADDLE_W, PADDLE_H);

        // Ball
        if (!ball.launched) {
            ball.x = paddleX + PADDLE_W/2;
            ball.y = CH - PADDLE_H - 20 - BALL_R;
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,217,255,0.6)';
        ctx.stroke();
    }

    const mKeys = { l: false, r: false };

    function setPaddleFromClientX(clientX) {
        const r = canvas.getBoundingClientRect();
        const scaleX = CW / r.width;
        const mx = (clientX - r.left) * scaleX;
        paddleX = mx - PADDLE_W / 2;
        paddleX = Math.max(0, Math.min(CW - PADDLE_W, paddleX));
    }

    function update(dt) {
        if (!gameRunning) return;

        // Paddle (стрелки и A/D; ключи хранятся в нижнем регистре)
        const PADDLE_SPEED = 8;
        if (keys['arrowleft'] || keys['a'] || mKeys.l) paddleX = Math.max(0, paddleX - PADDLE_SPEED);
        if (keys['arrowright'] || keys['d'] || mKeys.r) paddleX = Math.min(CW - PADDLE_W, paddleX + PADDLE_SPEED);

        if (!ball.launched) {
            ball.x = paddleX + PADDLE_W/2;
            return;
        }

        ball.x += ball.vx;
        ball.y += ball.vy;

        // Walls
        if (ball.x - BALL_R <= 0 || ball.x + BALL_R >= CW) ball.vx *= -1;
        if (ball.y - BALL_R <= 0) ball.vy *= -1;

        // Paddle bounce
        if (ball.vy > 0 && ball.y + BALL_R >= CH - PADDLE_H - 20 && ball.y - BALL_R <= CH - 20 &&
            ball.x >= paddleX && ball.x <= paddleX + PADDLE_W) {
            ball.vy = -Math.abs(ball.vy);
            const hit = (ball.x - (paddleX + PADDLE_W/2)) / (PADDLE_W/2);
            ball.vx = hit * 5;
        }

        // Lose life
        if (ball.y + BALL_R > CH) {
            lives--;
            document.getElementById('lives').textContent = lives;
            if (lives <= 0) {
                gameRunning = false;
                document.getElementById('loseScore').textContent = score;
                document.getElementById('loseOverlay').classList.add('visible');
                return;
            }
            resetBall();
            return;
        }

        // Bricks
        bricks.forEach(b => {
            if (!b.alive) return;
            if (ball.x + BALL_R >= b.x && ball.x - BALL_R <= b.x + b.w &&
                ball.y + BALL_R >= b.y && ball.y - BALL_R <= b.y + b.h) {
                b.alive = false;
                ball.vy *= -1;
                score += 10;
                document.getElementById('score').textContent = score;
            }
        });

        const allDead = bricks.every(b => !b.alive);
        if (allDead) {
            gameRunning = false;
            document.getElementById('winScore').textContent = score;
            document.getElementById('winOverlay').classList.add('visible');
        }
    }

    const keys = {};
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === ' ') { e.preventDefault(); launchBall(); }
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    let last = performance.now();
    function loop() {
        const now = performance.now();
        update((now - last) / 16.67);
        last = now;
        draw();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    document.getElementById('btnStart').onclick = () => {
        document.getElementById('startOverlay').classList.remove('visible');
        startGame();
    };
    document.getElementById('btnWinAgain').onclick = () => {
        document.getElementById('winOverlay').classList.remove('visible');
        startGame();
    };
    document.getElementById('btnLoseAgain').onclick = () => {
        document.getElementById('loseOverlay').classList.remove('visible');
        startGame();
    };

    canvas.addEventListener('mousemove', (e) => {
        if (!gameRunning) return;
        setPaddleFromClientX(e.clientX);
    });

    let touchDown = false;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchDown = true;
        setPaddleFromClientX(e.touches[0].clientX);
        launchBall();
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchDown) return;
        setPaddleFromClientX(e.touches[0].clientX);
    }, { passive: false });
    canvas.addEventListener('touchend', () => { touchDown = false; }, { passive: true });
    canvas.addEventListener('touchcancel', () => { touchDown = false; }, { passive: true });

    canvas.addEventListener('click', () => launchBall());

    // Мобильные кнопки (запасной вариант)
    const mL = document.getElementById('mL');
    const mR = document.getElementById('mR');
    const mLaunch = document.getElementById('mLaunch');
    function bindHold(el, key) {
        if (!el) return;
        el.addEventListener('touchstart', (e) => { e.preventDefault(); mKeys[key] = true; launchBall(); }, { passive: false });
        el.addEventListener('touchend', (e) => { e.preventDefault(); mKeys[key] = false; }, { passive: false });
        el.addEventListener('mousedown', () => { mKeys[key] = true; launchBall(); });
        el.addEventListener('mouseup', () => { mKeys[key] = false; });
        el.addEventListener('mouseleave', () => { mKeys[key] = false; });
    }
    bindHold(mL, 'l');
    bindHold(mR, 'r');
    if (mLaunch) {
        mLaunch.addEventListener('click', () => launchBall());
        mLaunch.addEventListener('touchstart', (e) => { e.preventDefault(); launchBall(); }, { passive: false });
    }
})();
    </script>
</body>
</html>
