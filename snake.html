<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="mini-app.css">
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="mini-app.js"></script>
    <title>Змейка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .score-board span {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .score-value {
            color: #00ff88;
            font-weight: bold;
        }

        canvas {
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1),
                        inset 0 0 30px rgba(0, 0, 0, 0.3);
            background: #0d0d35;
        }

        .controls-hint {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 46, 0.85);
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay p {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            padding: 14px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #0a0a2e;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
        }

        /* Мобильные кнопки */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: background 0.15s;
        }

        .mobile-controls button:active {
            background: rgba(0, 255, 136, 0.3);
        }

        .mobile-grid {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 5px;
            justify-content: center;
        }

        .back-btn {
            position: fixed;
            top: max(10px, env(safe-area-inset-top, 0px));
            left: max(10px, env(safe-area-inset-left, 0px));
            z-index: 200;
            background: rgba(0,0,0,0.52);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.82);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            line-height: 1;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { background: rgba(255,255,255,0.18); }

        @media (max-width: 600px) {
            canvas {
                width: min(92vw, 380px) !important;
                height: auto !important;
            }
            .mobile-controls {
                display: block;
            }
            .controls-hint {
                display: none;
            }
            h1 {
                font-size: 1.8rem;
            }
            .score-board {
                gap: 12px;
                font-size: 0.95rem;
                flex-wrap: wrap;
            }
            .score-board span {
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Назад</a>
    <div class="game-container">
        <h1>ЗМЕЙКА</h1>
        <div class="score-board">
            <span>Счёт: <span class="score-value" id="score">0</span></span>
            <span>Рекорд: <span class="score-value" id="highScore">0</span></span>
        </div>
        <div style="position: relative; display: inline-block;">
            <canvas id="game" width="400" height="400"></canvas>
            <div class="overlay" id="startOverlay">
                <h2>ЗМЕЙКА</h2>
                <p>Собирай еду и расти!</p>
                <button class="btn" id="startBtn">ИГРАТЬ</button>
            </div>
            <div class="overlay hidden" id="gameOverOverlay">
                <h2>ИГРА ОКОНЧЕНА</h2>
                <p>Счёт: <span id="finalScore">0</span></p>
                <button class="btn" id="restartBtn">ЗАНОВО</button>
            </div>
        </div>
        <p class="controls-hint">Управление: WASD или стрелки</p>
        <div class="mobile-controls">
            <div class="mobile-grid">
                <div></div>
                <button id="btnUp">▲</button>
                <div></div>
                <button id="btnLeft">◀</button>
                <button id="btnDown">▼</button>
                <button id="btnRight">▶</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake, direction, nextDirection, food, score, highScore, gameLoop, speed;
        let isRunning = false;

        highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        document.getElementById('highScore').textContent = highScore;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 120;
            document.getElementById('score').textContent = score;
            placeFood();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function update() {
            direction = nextDirection;

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Столкновение со стенами
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            // Столкновение с собой
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Проверка еды
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                // Ускорение
                if (speed > 60) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Фон
            ctx.fillStyle = '#0d0d35';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Сетка
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID, 0);
                ctx.lineTo(i * GRID, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID);
                ctx.lineTo(canvas.width, i * GRID);
                ctx.stroke();
            }

            // Змейка
            snake.forEach((segment, index) => {
                const progress = 1 - (index / snake.length);
                const green = Math.floor(150 + progress * 105);
                const alpha = 0.6 + progress * 0.4;

                if (index === 0) {
                    // Голова
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 15;
                } else {
                    ctx.fillStyle = `rgba(0, ${green}, 100, ${alpha})`;
                    ctx.shadowBlur = 0;
                }

                const padding = index === 0 ? 1 : 2;
                const radius = index === 0 ? 5 : 4;

                roundRect(
                    ctx,
                    segment.x * GRID + padding,
                    segment.y * GRID + padding,
                    GRID - padding * 2,
                    GRID - padding * 2,
                    radius
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // Глаза на голове
                if (index === 0) {
                    ctx.fillStyle = '#0a0a2e';
                    const eyeSize = 3;
                    let ex1, ey1, ex2, ey2;

                    if (direction.x === 1) { // вправо
                        ex1 = segment.x * GRID + 14; ey1 = segment.y * GRID + 5;
                        ex2 = segment.x * GRID + 14; ey2 = segment.y * GRID + 12;
                    } else if (direction.x === -1) { // влево
                        ex1 = segment.x * GRID + 5; ey1 = segment.y * GRID + 5;
                        ex2 = segment.x * GRID + 5; ey2 = segment.y * GRID + 12;
                    } else if (direction.y === -1) { // вверх
                        ex1 = segment.x * GRID + 5; ey1 = segment.y * GRID + 5;
                        ex2 = segment.x * GRID + 12; ey2 = segment.y * GRID + 5;
                    } else { // вниз
                        ex1 = segment.x * GRID + 5; ey1 = segment.y * GRID + 14;
                        ex2 = segment.x * GRID + 12; ey2 = segment.y * GRID + 14;
                    }

                    ctx.beginPath();
                    ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Еда
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID + GRID / 2,
                food.y * GRID + GRID / 2,
                GRID / 2 - 3,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Блик на еде
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID + GRID / 2 - 2,
                food.y * GRID + GRID / 2 - 2,
                3,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            init();
            draw();
            isRunning = true;
            gameLoop = setInterval(update, speed);
        }

        // Управление с клавиатуры
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': case 'ц': case 'Ц':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown': case 's': case 'S': case 'ы': case 'Ы':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft': case 'a': case 'A': case 'ф': case 'Ф':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight': case 'd': case 'D': case 'в': case 'В':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        // Свайп на canvas
        let swipeStartX = 0, swipeStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            swipeStartX = e.touches[0].clientX;
            swipeStartY = e.touches[0].clientY;
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - swipeStartX;
            const dy = e.changedTouches[0].clientY - swipeStartY;
            const adx = Math.abs(dx), ady = Math.abs(dy);
            if (Math.max(adx, ady) < 25 || !isRunning) return;
            if (adx > ady) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: false });

        // Мобильное управление
        document.getElementById('btnUp').addEventListener('click', () => {
            if (isRunning && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        });
        document.getElementById('btnDown').addEventListener('click', () => {
            if (isRunning && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        });
        document.getElementById('btnLeft').addEventListener('click', () => {
            if (isRunning && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        });
        document.getElementById('btnRight').addEventListener('click', () => {
            if (isRunning && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        });

        // Кнопки
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Начальная отрисовка
        init();
        draw();
    </script>
</body>
</html>
